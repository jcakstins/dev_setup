# ---------- Font ----------
font_family      JetBrainsMono NF
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0

# ---------- Truecolor ----------
# kitty supports truecolor natively; TERM is set to advertise it
term xterm-256color

# ---------- Appearance ----------
# Use a comfortable window size and padding
remember_window_size  yes
initial_window_width  120c
initial_window_height 35c
window_padding_width  4

# ---------- Theme: Idle Toes ----------
background            #323232
foreground            #ffffff
cursor                #d6d6d6
selection_background  #5b5b5b
selection_foreground  #323232
color0                #323232
color8                #535353
color1                #d25252
color9                #f07070
color2                #7fe173
color10               #9dff90
color3                #ffc66d
color11               #ffe48b
color4                #4098ff
color12               #5eb7f7
color5                #f57fff
color13               #ff9dff
color6                #bed6ff
color14               #dcf4ff
color7                #eeeeec
color15               #ffffff
active_tab_foreground   #eeeeee
active_tab_background   #5b5b5b
inactive_tab_foreground #ffffff
inactive_tab_background #282828

# ---------- Behaviour ----------
enable_audio_bell no
shell_integration enabled

# ---------- macOS Option key ----------
# Make Option act as Alt so shell word-navigation sequences are sent correctly.
# Without this, Option+Arrow sends a macOS-native sequence that zsh ignores.
macos_option_as_alt yes

# ---------- Shell / readline navigation ----------
# These map keys to the escape sequences that zsh/readline (emacs mode) expects.
# Matches behaviour of macOS Terminal.app so muscle memory transfers.

# Word navigation (Option+Arrow → Alt+b / Alt+f)
map opt+left        send_text all \x1bb
map opt+right       send_text all \x1bf

# Word deletion
map opt+backspace   send_text all \x1b\x7f
map opt+delete      send_text all \x1bd

# Line navigation (Cmd+Arrow → Ctrl+A / Ctrl+E)
map cmd+left        send_text all \x01
map cmd+right       send_text all \x05

# Delete to start of line (Cmd+Backspace → Ctrl+U)
map cmd+backspace   send_text all \x15

# ---------- vim-kitty-navigator ----------
# Seamless Ctrl+hjkl navigation between kitty splits AND vim/neovim splits.
# When a pane has IS_VIM=true (set by the vim plugin), kitty hands the key to
# vim; otherwise kitty moves focus to the neighboring window itself.
#
# Requires: allow_remote_control + listen_on (full restart needed after adding)
# Vim plugin: Plug 'knubie/vim-kitty-navigator'  (or lazy.nvim equivalent)
allow_remote_control yes
listen_on unix:/tmp/mykitty

# Active when vim is NOT focused — kitty handles the navigation
map ctrl+h neighboring_window left
map ctrl+j neighboring_window down
map ctrl+k neighboring_window up
map ctrl+l neighboring_window right

# Disabled when vim IS focused — vim plugin takes over via IS_VIM=true user var
map --when-focus-on var:IS_VIM=true ctrl+h
map --when-focus-on var:IS_VIM=true ctrl+j
map --when-focus-on var:IS_VIM=true ctrl+k
map --when-focus-on var:IS_VIM=true ctrl+l

# ---------- Window / tab management ----------
map cmd+d           launch --location=vsplit --cwd=current
map cmd+shift+d     launch --location=hsplit --cwd=current
map cmd+shift+]     next_window
map cmd+shift+[     previous_window

map cmd+t           new_tab_with_cwd
map cmd+w           close_tab
map cmd+1           goto_tab 1
map cmd+2           goto_tab 2
map cmd+3           goto_tab 3
map cmd+4           goto_tab 4
map cmd+5           goto_tab 5

# Font size
map cmd+equal       change_font_size all +1.0
map cmd+minus       change_font_size all -1.0
map cmd+0           change_font_size all 0
